services:

  backend:
    image: ghcr.io/largy-dev/tradingplan-backend:latest
    container_name: tradingbot-backend
    restart: unless-stopped
    environment:
      PORT: "4000"
      DATABASE_URL: "file:/data/trading.db"
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET}
    volumes:
      - db_data:/data
    networks:
      - bot_net

  frontend:
    image: ghcr.io/largy-dev/tradingplan-frontend:latest
    container_name: tradingbot-frontend
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - bot_net

volumes:
  db_data:
    driver: local

networks:
  bot_net:
    driver: bridge
