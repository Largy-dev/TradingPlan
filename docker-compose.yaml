services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tradingbot-backend
    restart: unless-stopped
    environment:
      PORT: "4000"
      DATABASE_URL: "file:/data/trading.db"
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET}
    volumes:
      - db_data:/data
    networks:
      - bot_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/graphql?query=%7B__typename%7D"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tradingbot-frontend
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - bot_net

volumes:
  db_data:
    driver: local

networks:
  bot_net:
    driver: bridge
